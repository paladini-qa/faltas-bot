services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_KEY=${API_KEY}
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-faltasbot}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-faltasbot}"
    volumes:
      # Sessão do WhatsApp — persiste entre restarts para não pedir QR code novamente
      - wwebjs_auth:/app/.wwebjs_auth
      - wwebjs_cache:/app/.wwebjs_cache
      # PDFs enviados pelo usuário
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - faltasbot

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-faltasbot}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-faltasbot}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faltasbot} -d ${POSTGRES_DB:-faltasbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - faltasbot

volumes:
  pgdata:
  wwebjs_auth:
  wwebjs_cache:
  uploads:

networks:
  faltasbot:
    driver: bridge
